<!DOCTYPE html>
<html lang="en">
	<head>
		<script>
			let update = () => {};

			function connectElgatoStreamDeckSocket(inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo) {
				const websocket = new WebSocket("ws://localhost:" + inPort);
				inActionInfo = JSON.parse(inActionInfo);
				websocket.onopen = () => {
					websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inPropertyInspectorUUID }));
				};

				const step = document.getElementById("step");
				const stepVal = document.getElementById("step-val");
				step.value = inActionInfo.payload.settings.step ?? 10;
				stepVal.textContent = step.value + "%";

				update = () => {
					stepVal.textContent = step.value + "%";
					websocket.send(JSON.stringify({
						event: "setSettings",
						context: inActionInfo.context,
						payload: { step: parseInt(step.value) },
					}));
				};
			}
		</script>
		<link rel="stylesheet" href="sdpi.css" />
	</head>
	<body>
		<p style="padding: 0 0.75rem; font-size: 0.8em; color: #888">
			Decreases Stream Deck brightness by the configured step each time the key is pressed.
		</p>
		<div class="sdpi-item">
			<div class="sdpi-item-label">Step</div>
			<input id="step" type="range" min="1" max="50" oninput="update()" class="sdpi-item-value" />
			<span id="step-val" style="min-width: 3em; text-align: right; color: #ccc">10%</span>
		</div>
	</body>
</html>
