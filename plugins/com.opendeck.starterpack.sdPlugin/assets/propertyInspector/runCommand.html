<!DOCTYPE html>
<html lang="en">
	<head>
		<script>
			let update = () => {};

			function connectElgatoStreamDeckSocket(inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo) {
				const websocket = new WebSocket("ws://localhost:" + inPort);
				inActionInfo = JSON.parse(inActionInfo);
				websocket.onopen = () => {
					websocket.send(JSON.stringify({
						event: inRegisterEvent,
						uuid: inPropertyInspectorUUID,
					}));
				};

				const isEncoder = inActionInfo.payload.controller == "Encoder";
				if (isEncoder) {
					document.getElementById("encoder").style.display = "block";
					document.getElementById("down-label").innerText = "Dial press";
					document.getElementById("up-label").innerText = "Dial release";
				}

				const down = document.getElementById("down");
				down.value = inActionInfo.payload.settings.down ?? "";
				const up = document.getElementById("up");
				up.value = inActionInfo.payload.settings.up ?? "";
				const rotate = document.getElementById("rotate");
				rotate.value = inActionInfo.payload.settings.rotate ?? "";
				const file = document.getElementById("file");
				file.value = inActionInfo.payload.settings.file ?? "";
				const show = document.getElementById("show");
				show.checked = inActionInfo.payload.settings.show ?? false;

				update = () => {
					websocket.send(JSON.stringify({
						event: "setSettings",
						context: inActionInfo.context,
						payload: {
							down: down.value,
							up: up.value,
							rotate: rotate.value,
							file: file.value,
							show: show.checked,
						},
					}));
				};
			}
		</script>
		<link rel="stylesheet" href="sdpi.css" />
	</head>
	<body>
		<div class="sdpi-item">
			<div class="sdpi-item-label" id="down-label">On press</div>
			<input id="down" oninput="update()" class="sdpi-item-value" style="font-family: monospace"
				placeholder='e.g. notify-send "Done!" or xdg-open ~/Documents' />
		</div>
		<p style="padding: 0 0.75rem; font-size: 0.8em; color: #888; margin-top: -4px">
			Command to run when the key is <strong>pressed</strong>.
		</p>

		<div class="sdpi-item" style="margin-top: 8px">
			<div class="sdpi-item-label" id="up-label">On release</div>
			<input id="up" oninput="update()" class="sdpi-item-value" style="font-family: monospace"
				placeholder="Optional — runs when key is released" />
		</div>

		<div id="encoder" style="display: none">
			<div class="sdpi-item" style="margin-top: 8px">
				<div class="sdpi-item-label">Dial rotate</div>
				<input id="rotate" oninput="update()" class="sdpi-item-value" style="font-family: monospace"
					placeholder="e.g. pactl set-sink-volume @DEFAULT_SINK@ %d%" />
			</div>
			<p style="padding: 0 0.75rem; font-size: 0.8em; color: #888; margin-top: -4px">
				Use <code>%d</code> for rotation ticks (negative = left, positive = right).<br/>
				Example: <code>pactl set-sink-volume @DEFAULT_SINK@ %d%</code>
			</p>
		</div>

		<hr style="margin: 12px 0; border-color: #444" />

		<div class="sdpi-item">
			<div class="sdpi-item-label">Save output to</div>
			<input id="file" oninput="update()" class="sdpi-item-value" style="font-family: monospace"
				placeholder="Optional — file path to save command output" />
		</div>
		<div class="sdpi-item">
			<div class="sdpi-item-label">Show output on key</div>
			<input id="show" type="checkbox" oninput="update()" class="sdpi-item-value" />
			<label for="show"><span></span></label>
		</div>
	</body>
</html>
