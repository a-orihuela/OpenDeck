<!DOCTYPE html>
<html lang="en">
	<head>
		<script>
			let update = () => {};

			function connectElgatoStreamDeckSocket(inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo) {
				const websocket = new WebSocket("ws://localhost:" + inPort);
				inActionInfo = JSON.parse(inActionInfo);
				websocket.onopen = () => {
					websocket.send(JSON.stringify({
						event: inRegisterEvent,
						uuid: inPropertyInspectorUUID,
					}));
				};

				const isEncoder = inActionInfo.payload.controller == "Encoder";
				if (isEncoder) {
					document.getElementById("encoder").style.display = "block";
					document.getElementById("down-label").innerText = "Dial press";
					document.getElementById("up-label").innerText = "Dial release";
				}

				const down = document.getElementById("down");
				down.value = inActionInfo.payload.settings.down ?? "";
				const up = document.getElementById("up");
				up.value = inActionInfo.payload.settings.up ?? "";
				const anticlockwise = document.getElementById("anticlockwise");
				anticlockwise.value = inActionInfo.payload.settings.anticlockwise ?? "";
				const clockwise = document.getElementById("clockwise");
				clockwise.value = inActionInfo.payload.settings.clockwise ?? "";

				update = () => {
					websocket.send(JSON.stringify({
						event: "setSettings",
						context: inActionInfo.context,
						payload: {
							down: down.value,
							up: up.value,
							anticlockwise: anticlockwise.value,
							clockwise: clockwise.value,
						},
					}));
				};
			}
		</script>
		<link rel="stylesheet" href="sdpi.css" />
	</head>
	<body>
		<div class="sdpi-item">
			<div class="sdpi-item-label" id="down-label">On press</div>
			<input id="down" oninput="update()" class="sdpi-item-value"
				placeholder="e.g. https://google.com" />
		</div>
		<p style="padding: 0 0.75rem; font-size: 0.8em; color: #888; margin-top: -4px">
			URL to open when the key is <strong>pressed</strong>. Examples:<br/>
			<code>https://google.com</code> &nbsp;·&nbsp;
			<code>mailto:you@example.com</code> &nbsp;·&nbsp;
			<code>file:///home/user/docs</code>
		</p>

		<div class="sdpi-item" style="margin-top: 8px">
			<div class="sdpi-item-label" id="up-label">On release</div>
			<input id="up" oninput="update()" class="sdpi-item-value"
				placeholder="Optional — opens when key is released" />
		</div>
		<p style="padding: 0 0.75rem; font-size: 0.8em; color: #888; margin-top: -4px">
			Useful to open a second URL after releasing the key, or leave empty.
		</p>

		<div id="encoder" style="display: none">
			<div class="sdpi-item" style="margin-top: 8px">
				<div class="sdpi-item-label">Rotate left</div>
				<input id="anticlockwise" oninput="update()" class="sdpi-item-value"
					placeholder="e.g. https://previous-page.com" />
			</div>
			<div class="sdpi-item">
				<div class="sdpi-item-label">Rotate right</div>
				<input id="clockwise" oninput="update()" class="sdpi-item-value"
					placeholder="e.g. https://next-page.com" />
			</div>
		</div>
	</body>
</html>
