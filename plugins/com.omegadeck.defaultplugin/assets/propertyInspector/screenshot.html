<!DOCTYPE html>
<html lang="en">
	<head>
		<script>
			let update = () => {};

			function connectElgatoStreamDeckSocket(inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo) {
				const websocket = new WebSocket("ws://localhost:" + inPort);
				inActionInfo = JSON.parse(inActionInfo);
				websocket.onopen = () => {
					websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inPropertyInspectorUUID }));
				};

				const mode = document.getElementById("mode");
				const cmdRow = document.getElementById("cmd-row");
				const cmd = document.getElementById("cmd");

				mode.value = inActionInfo.payload.settings.mode ?? "system_shortcut";
				cmd.value = inActionInfo.payload.settings.command ?? "";
				cmdRow.style.display = mode.value === "command" ? "flex" : "none";

				function onModeChange() {
					cmdRow.style.display = mode.value === "command" ? "flex" : "none";
					update();
				}

				mode.addEventListener("change", onModeChange);

				update = () => {
					websocket.send(JSON.stringify({
						event: "setSettings",
						context: inActionInfo.context,
						payload: {
							mode: mode.value,
							command: cmd.value || null,
						},
					}));
				};
			}
		</script>
		<link rel="stylesheet" href="sdpi.css" />
	</head>
	<body>
		<div class="sdpi-item">
			<div class="sdpi-item-label">Method</div>
			<div class="sdpi-item-value select-wrapper">
				<select id="mode" oninput="update()">
					<option value="system_shortcut">System shortcut (PrintScreen / Cmd+Shift+3)</option>
					<option value="command">Custom command</option>
				</select>
			</div>
		</div>

		<div id="cmd-row" class="sdpi-item" style="display: none">
			<div class="sdpi-item-label">Command</div>
			<input id="cmd" oninput="update()" class="sdpi-item-value" style="font-family: monospace"
				placeholder="e.g. flameshot gui  or  scrot ~/Desktop/ss.png" />
		</div>

		<p style="padding: 0 0.75rem; font-size: 0.8em; color: #888; margin-top: 8px">
			<strong>System shortcut</strong>: sends PrintScreen (Linux/Windows) or Cmd+Shift+3 (macOS).<br/>
			<strong>Custom command</strong>: runs any screenshot tool installed on your system.
		</p>
	</body>
</html>
